<!DOCTYPE html>
<html>
<head>
    <title>Aadhaar Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eeeeee;
        }

        .card {
            width: 400px;
            padding: 15px;
            background: #ffffff;
            border: 2px solid #d32f2f;
            margin: 50px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        h2 {
            text-align: center;
            color: #d32f2f;
            margin: 5px 0 15px;
            letter-spacing: 1px;
        }

        .photo {
            width: 80px;
            height: 100px;
            border: 1px solid #000;
            float: right;
            text-align: center;
            line-height: 100px;
            font-size: 12px;
            background: #f0f0f0;
            margin-left: 10px;
        }

        p {
            margin: 6px 0;
            font-size: 14px;
        }

        b {
            display: inline-block;
            width: 120px;
        }

        .aadhaar-number {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .footer {
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 6px;
        }

        .clearfix::after {
            content: "";
            display: block;
            clear: both;
        }
    </style>
</head>
<body>

<div class="card clearfix">
    <h2>AADHAAR CARD</h2>

    <div class="photo">Photo</div>

    <p><b>Name:</b> Rahul Sharma</p>
    <p><b>DOB:</b> 01-01-1998</p>
    <p><b>Gender:</b> Male</p>
    <p><b>Address:</b> New Delhi, India</p>

    <p class="aadhaar-number">1234 5678 9012</p>

    <div class="footer">
        Government of India • Unique Identification Authority of India
    </div>
</div>

</body>
</html>
