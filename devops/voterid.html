<!DOCTYPE html>
<html>
<head>
    <title>Voter ID Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .card {
            width: 380px;
            padding: 15px;
            background: #ffffff;
            border: 2px solid #000;
            margin: 50px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        h2 {
            text-align: center;
            margin: 5px 0 15px;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .photo {
            width: 80px;
            height: 100px;
            border: 1px solid #000;
            float: right;
            text-align: center;
            line-height: 100px;
            font-size: 12px;
            background: #e0e0e0;
            margin-left: 10px;
        }

        p {
            margin: 6px 0;
            font-size: 14px;
        }

        b {
            display: inline-block;
            width: 110px;
        }

        .footer {
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 5px;
        }

        /* Clear float */
        .clearfix::after {
            content: "";
            display: block;
            clear: both;
        }
    </style>
</head>
<body>

<div class="card clearfix">
    <h2>VOTER ID CARD</h2>

    <div class="photo">Photo</div>

    <p><b>Name:</b> John Doe</p>
    <p><b>Voter ID:</b> ABC1234567</p>
    <p><b>Date of Birth:</b> 01-01-1998</p>
    <p><b>Gender:</b> Male</p>
    <p><b>Address:</b> New Delhi, India</p>

    <div class="footer">
        Election Commission of India
    </div>
</div>

</body>
</html>
