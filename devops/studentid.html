<!DOCTYPE html>
<html>
<head>
    <title>Student ID Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f8ff;
        }

        .card {
            width: 320px;
            padding: 15px;
            background: #ffffff;
            border: 2px solid #004aad;
            margin: 50px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        h2 {
            text-align: center;
            color: #004aad;
            margin: 5px 0 15px;
            letter-spacing: 1px;
        }

        .photo {
            width: 80px;
            height: 100px;
            border: 1px solid #000;
            float: right;
            text-align: center;
            line-height: 100px;
            font-size: 12px;
            background: #eaf1ff;
            margin-left: 10px;
        }

        p {
            margin: 6px 0;
            font-size: 14px;
        }

        b {
            display: inline-block;
            width: 90px;
        }

        .college {
            font-size: 13px;
            font-weight: bold;
            color: #333;
        }

        .footer {
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 6px;
        }

        .clearfix::after {
            content: "";
            display: block;
            clear: both;
        }
    </style>
</head>
<body>

<div class="card clearfix">
    <h2>STUDENT ID CARD</h2>

    <div class="photo">Photo</div>

    <p><b>Name:</b>GG Buffun</p>
    <p><b>Roll No:</b> 21CS045</p>
    <p><b>Course:</b>Goal Keeping</p>
    <p class="college">juventus University</p>
    <p><b>Valid Till:</b> 2026</p>

    <div class="footer">
        Student Identity Card
    </div>
</div>

</body>
</html>
