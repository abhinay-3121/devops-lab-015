<!DOCTYPE html>
<html>
<head>
    <title>Driving License</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: green;
        }

        .card {
            width: 400px;
            padding: 15px;
            background: #ffffff;
            border: 2px solid #2e7d32;
            margin: 50px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        h2 {
            text-align: center;
            color: #2e7d32;
            margin: 5px 0 15px;
            letter-spacing: 1px;
        }

        .photo {
            width: 80px;
            height: 100px;
            border: 1px solid #000;
            float: right;
            text-align: center;
            line-height: 100px;
            font-size: 12px;
            background: #e0f2f1;
            margin-left: 10px;
        }

        p {
            margin: 6px 0;
            font-size: 14px;
        }

        b {
            display: inline-block;
            width: 120px;
        }

        .license-number {
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin: 8px 0;
        }

        .footer {
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 6px;
        }

        .clearfix::after {
            content: "";
            display: block;
            clear: both;
        }
    </style>
</head>
<body>

<div class="card clearfix">
    <h2>DRIVING LICENSE</h2>

    <div class="photo">Photo</div>

    <p><b>Name:</b> Pele</p>
    <p class="license-number"><b>License No:</b> DL-0420112345678</p>
    <p><b>Vehicle Type:</b> LMV</p>
    <p><b>Issue Date:</b> 01-01-2020</p>
    <p><b>Valid Till:</b> 01-01-2040</p>

    <div class="footer">
        Transport Department • Government of India
    </div>
</div>

</body>
</html>
